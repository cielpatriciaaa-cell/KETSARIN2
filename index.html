<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>𝖲𝖤𝖳𝖲𝖠𝖱𝖨𝖭</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Tahoma", sans-serif;
      min-height: 100vh;
      overflow: hidden;
      background: linear-gradient(180deg, #ffd9e8, #ffcfe0, #ffeaf2);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      color: #7a3b57;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 360px;
      text-align: center;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: 28px;
      padding: 24px 20px 28px;
      box-shadow: 0 12px 35px rgba(255, 143, 186, 0.25);
    }

    .photo {
      width: 130px;
      height: 130px;
      margin: 0 auto 16px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #ffb6cf;
      box-shadow: 0 0 20px rgba(255, 145, 180, 0.35);
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 26px;
      color: #ff5f9a;
      margin-bottom: 8px;
    }

    p {
      font-size: 16px;
      margin-bottom: 18px;
      color: #8b4a67;
    }

    .pin-display {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 22px;
      min-height: 18px;
    }

    .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #ff90b9;
      background: rgba(255, 255, 255, 0.7);
      transition: 0.25s;
      box-shadow: 0 0 8px rgba(255, 182, 203, 0.35);
    }

    .dot.filled {
      background: #ff6fa8;
      box-shadow: 0 0 12px rgba(255, 111, 168, 0.65);
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .keypad button {
      height: 62px;
      border: none;
      border-radius: 18px;
      font-size: 22px;
      font-weight: bold;
      color: #ffffff;
      cursor: pointer;
      background: linear-gradient(180deg, #ffb7d1, #ff95bc);
      box-shadow: 0 6px 16px rgba(255, 133, 180, 0.25);
      transition: transform 0.15s, filter 0.2s;
    }

    .keypad button:hover {
      filter: brightness(1.05);
      transform: scale(1.05);
    }

    .keypad button:active {
      transform: scale(0.97);
    }

    .heart {
      position: absolute;
      top: -10vh;
      color: #ff8fba;
      font-size: 22px;
      animation: fall linear infinite;
      opacity: 0.75;
      z-index: 1;
      user-select: none;
      pointer-events: none;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
      }
      10% {
        opacity: 0.9;
      }
      100% {
        transform: translateY(110vh) scale(1.4);
        opacity: 0;
      }
    }

    .note {
      margin-top: 16px;
      font-size: 13px;
      color: #a85d7f;
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div id="hearts"></div>

  <div class="container">
    <div class="photo">
      <img src="images/1.jpg"/>
    </div>

    <h1>⋆.𐙚 ̊ คนสวยของเค้า ⋆˙⟡</h1>
    
    <div class="pin-display" id="display">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>

    </div>

    <div class="keypad">
      <button type="button" onclick="press('1')">1</button>
      <button type="button" onclick="press('2')">2</button>
      <button type="button" onclick="press('3')">3</button>
      <button type="button" onclick="press('4')">4</button>
      <button type="button" onclick="press('5')">5</button>
      <button type="button" onclick="press('6')">6</button>
      <button type="button" onclick="press('7')">7</button>
      <button type="button" onclick="press('8')">8</button>
      <button type="button" onclick="press('9')">9</button>
      <button type="button" onclick="backspace()">⌫</button>
      <button type="button" onclick="press('0')">0</button>
      <button type="button" onclick="checkPassword()">❤️</button>
    </div>

    <div class="note">รักอ้วนมากๆนะ</div>
  </div>

  <script>
    let input = "";
    const correctPassword = "140269";

    function updateDots() {
      const dots = document.querySelectorAll(".dot");
      dots.forEach((dot, index) => {
        if (index < input.length) {
          dot.classList.add("filled");
        } else {
          dot.classList.remove("filled");
        }
      });
    }

    function press(num) {
      if (input.length < 6) {
        input += num;
        updateDots();
      }
    }

    function backspace() {
      input = input.slice(0, -1);
      updateDots();
    }

    function checkPassword() {
      if (input === correctPassword) {
        window.location.href = "loading.html";
      } else {
        alert("รหัสไม่ถูกนะออย ลองอีกครั้ง 💕");
        input = "";
        updateDots();
      }
    }

    function createHearts() {
      const heartsContainer = document.getElementById("hearts");

      for (let i = 0; i < 25; i++) {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 5 + 5) + "s";
        heart.style.fontSize = (Math.random() * 18 + 14) + "px";
        heart.style.opacity = Math.random();
        heart.style.animationDelay = Math.random() * 5 + "s";
        heartsContainer.appendChild(heart);
      }
    }

    createHearts();
    updateDots();
  </script>
</body>
</html>
